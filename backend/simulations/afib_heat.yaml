# Heat + dehydration triggers AFib
name:        "Heat-Triggered AFib"
description: "Hot weather and dehydration trigger AFib during nadolol trough."
speed:    300
duration: "18m"

drugs:
  - name: nadolol
    doses:
      - amount_mg: 40
        taken_at: "-13h"

heart:
  baseline_bpm: 74
  noise_std:    3.0
  segments:
    - start: "0m"
      end:   "5m"
      pattern: normal
      bpm: 74

    - start: "5m"
      end:   "7m"
      pattern: normal
      bpm: 82
      bpm_std: 4.0

    - start: "7m"
      end:   "9m"
      pattern: tachycardia
      bpm: 100
      bpm_std: 6.0

    - start:    "9m"
      end:      "14m"
      pattern:  afib
      bpm_mean: 130
      bpm_std:  28

    - start: "14m"
      end:   "18m"
      pattern: normal
      bpm: 80
      bpm_std: 4.0
